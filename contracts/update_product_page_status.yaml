# 대화 계약: 상품페이지 공개/비공개

action: update_product_page_status
label: "상품페이지 공개/비공개"

required_context:
  master_cms_id:
    resolve: "search_masters로 검색"
    if_multiple: "목록 보여주고 선택받기"
    if_zero: "마스터를 찾을 수 없다고 안내"
  page_id:
    resolve: "get_product_page_list로 조회"
    if_multiple: "목록 보여주고 선택받기"
    if_one: "자동 선택 가능 (확인 질문)"

invariants:
  - id: no_auto_execute
    rule: "유저 확인 없이 쓰기 API를 호출하면 안 된다"
    enforcement: "Harness가 강제 (HC3)"

  - id: cascade_warning
    rule: "마지막 공개 페이지면 메인 EXCLUDED 경고해야 한다"
    enforcement: "Harness가 강제 (cascading)"

  - id: intent_clarification
    rule: "'상품페이지 안 보이게' 요청 시 의도 확인 필수"
    clarification:
      - "구독 페이지에서 아예 안 보이게 → 메인 상품페이지 EXCLUDED"
      - "특정 상품페이지만 비공개 → 해당 페이지 INACTIVE"

disambiguation:
  - input: "상품페이지 안 보이게 해줘"
    ambiguous: "메인 EXCLUDED인지 페이지 INACTIVE인지"
    required: "의도 확인 질문"
