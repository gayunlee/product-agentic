<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Panel Playground</title>
  <style>
    .agent-message table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
    .agent-message th, .agent-message td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
    .agent-message th { background: #f5f5f5; font-weight: 600; }
    .agent-message h1, .agent-message h2, .agent-message h3 { margin: 8px 0 4px; font-size: 15px; }
    .agent-message ul, .agent-message ol { margin: 4px 0; padding-left: 20px; }
    .agent-message code { background: #f0f0f0; padding: 1px 4px; border-radius: 3px; font-size: 13px; }
    .agent-message pre { background: #f0f0f0; padding: 8px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .agent-message a { color: #0066cc; }
    .agent-message p { margin: 4px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
