id: hidden
label: 히든 처리
description: 상품페이지를 히든으로 전환합니다
icon: "🫥"

steps:
  - id: select_master
    type: select_master
    label: 클럽 선택
    message: "**히든 처리** — 오피셜클럽을 선택하세요."

  - id: select_page
    type: select_page
    label: 페이지 선택
    message: "**히든 처리** — {master_name}의 상품페이지를 선택하세요."

  - id: confirm
    type: confirm
    label: 확인
    cascading: true
    message: "**히든 처리**\n\n**대상**: {target}\n\n진행하시겠어요?"

  - id: execute
    type: execute
    label: 실행
    api: update_product_page
    params:
      product_page_id: "{page_id}"
      updates: '{"isHidden": true}'
    done_message: "✅ **히든 처리 완료**\n\n{target}"
    done_buttons:
      - type: navigate
        label: 결과 확인
        page_key: product_page_detail
        params: {id: "{page_id}"}
        clickable: always
