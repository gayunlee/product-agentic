id: product_hide
label: 상품 비공개
description: 상품 옵션을 비공개로 전환합니다
icon: "👁️‍🗨️"

steps:
  - id: select_master
    type: select_master
    label: 클럽 선택
    message: "**상품 비공개** — 오피셜클럽을 선택하세요."

  - id: select_page
    type: select_page
    label: 페이지 선택
    message: "**상품 비공개** — {master_name}의 상품페이지를 선택하세요."

  - id: select_product
    type: select_product
    label: 상품 선택
    message: "**상품 비공개** — {page_title}의 상품을 선택하세요."
    exclude:
      field: isDisplay
      value: "false"
      reason: "이미 비공개"

  - id: confirm
    type: confirm
    label: 확인
    cascading: true
    message: "**상품 비공개**\n\n**대상**: {target}\n\n진행하시겠어요?"

  - id: execute
    type: execute
    label: 실행
    api: update_product_display
    params:
      product_id: "{product_id}"
      is_display: false
    done_message: "✅ **상품 비공개 완료**\n\n{target}"
    done_buttons:
      - type: navigate
        label: 결과 확인
        page_key: product_page_detail
        params: {id: "{page_id}"}
        clickable: always
