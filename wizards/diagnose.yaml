id: diagnose
label: 노출 진단
description: 오피셜클럽의 노출 상태를 진단합니다
icon: "🔍"

steps:
  - id: select_master
    type: select_master
    label: 클럽 선택
    message: "**노출 진단** — 오피셜클럽을 선택하세요."

  - id: execute
    type: execute
    label: 진단 실행
    handler: diagnose_visibility
    render:
      type: checklist
      title: "📊 노출 진단 결과"
      summary_pass: "{master_name} — 모든 조건 정상."
      summary_fail: "{master_name} — 원인: {first_failure}"
      fail_links:
        master_public:
          label: 오피셜클럽 설정
          page_key: official_club
          params: {masterId: "{master_cms_id}"}
        main_product_active:
          label: 메인 상품 설정
          page_key: main_product
        page_active:
          label: 상품 페이지 목록
          page_key: product_page_list
        weblink_set:
          label: 웹링크 설정
          page_key: official_club
          params: {masterId: "{master_cms_id}"}
        weblink_target_valid:
          label: 웹링크 설정
          page_key: official_club
          params: {masterId: "{master_cms_id}"}
        weblink_target_stable:
          label: 웹링크 설정
          page_key: official_club
          params: {masterId: "{master_cms_id}"}
      default_button:
        label: 설정 관리
        page_key: product_page_list
